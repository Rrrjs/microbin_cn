{% include "header.html" %}

<form id="auth-form" method="POST" action="{{ args.public_path_as_str() }}/admin/" enctype="multipart/form-data">
  <label for="username">管理员用户名</label>
  <input id="username-field" placeholder="用户名" type="username" autocomplete="off" name="username">
  <label for="password">管理员密码</label>
  <input id="password-field" placeholder="密码" type="password" autocomplete="off" name="password">
  <button>登录</button>
  {% if status == "incorrect" %}
  <p>
    用户名或密码错误。
  </p>
  {% endif %}
</form>

{% include "footer.html" %} {% if !args.pure_html %}
<style>
  #auth-form {
    background-color: var(--background-alt);
    border-radius: 6px;
    padding: 10px;
    width: fit-content;
    margin: auto;
    margin-top: 2rem;
    margin-bottom: 2rem;
  }
</style>
{% endif %}
